name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # actions内部の依存ライブラリが出す punycode 非推奨警告(DEP0040)を抑制
      NODE_OPTIONS: --disable-warning=DEP0040
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - name: バージョン番号を埋め込む(コミットSHA + JSTの日時)
        run: |
          VERSION="$(git rev-parse --short HEAD) $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M')"
          sed -i "s/__VERSION__/${VERSION}/" index.html
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v5
